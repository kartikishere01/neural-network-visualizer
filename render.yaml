services:
  - type: web
    name: neural-network-visualizer
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm install --prefix client --legacy-peer-deps && npm install --prefix server && npm run build:client && npm run build:server
    startCommand: npm start
    healthCheckPath: /api/model-info
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.0
