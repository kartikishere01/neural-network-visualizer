services:
  - type: web
    name: neural-network-visualizer
    env: node
    region: oregon
    plan: free
    buildCommand: npm install --include=dev && npm install --prefix client --legacy-peer-deps --include=dev && npm install --prefix server --include=dev && npm run build:client && npm run build:server
    startCommand: NODE_ENV=production npm start
    healthCheckPath: /api/model-info
    envVars:
      - key: NODE_VERSION
        value: 20.11.0
